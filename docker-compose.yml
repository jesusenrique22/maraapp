services:
  postgres:
    image: postgres:16-alpine
    container_name: maraplus-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: maraplus
      POSTGRES_PASSWORD: maraplus_dev
      POSTGRES_DB: maraplus
    volumes:
      - maraplus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U maraplus -d maraplus']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  maraplus_pg_data:
