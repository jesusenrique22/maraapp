services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maraplus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-maraplus}
    volumes:
      - maraplus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-maraplus} -d ${POSTGRES_DB:-maraplus}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend-nestjs
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-maraplus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-maraplus}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-maraplus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-maraplus}?schema=public
      PORT: 3000
      PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET en .env.production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@maraplus.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
    volumes:
      - maraplus_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-80}:80'
    depends_on:
      - api

volumes:
  maraplus_pg_data:
  maraplus_uploads:
