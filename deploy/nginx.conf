server {
  listen 80;
  server_name _;

  client_max_body_size 10M;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # API NestJS
  location ~ ^/(auth|products|categories|banners|orders|branches|consultations|admin|ai|health|uploads)(/|$) {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Flutter web — assets estáticos
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|json|wasm|bin|map)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, immutable";
  }

  location /assets/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, immutable";
  }

  location /icons/ {
    try_files $uri =404;
  }

  # SPA — rutas del router de Flutter
  location / {
    try_files $uri $uri/ /index.html;
  }
}
